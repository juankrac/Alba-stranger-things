<div id="modalCreatividad" class="modal">
    <div class="modal-contenido modal-dibujo">
        <span class="cerrar-modal">&times;</span>
        <h2>🎨 ESTUDIO DE DIBUJO</h2>
        
        <div class="dibujo-layout">
            <!-- Paleta de colores (vertical) -->
            <div class="paleta-vertical">
                <div class="color-btn" data-color="#ff0000" style="background: #ff0000;" title="Rojo"></div>
                <div class="color-btn" data-color="#ff8800" style="background: #ff8800;" title="Naranja"></div>
                <div class="color-btn" data-color="#ffee00" style="background: #ffee00;" title="Amarillo"></div>
                <div class="color-btn" data-color="#00cc44" style="background: #00cc44;" title="Verde"></div>
                <div class="color-btn" data-color="#0088ff" style="background: #0088ff;" title="Azul"></div>
                <div class="color-btn" data-color="#aa22ff" style="background: #aa22ff;" title="Morado"></div>
                <div class="color-btn" data-color="#ff44cc" style="background: #ff44cc;" title="Rosa"></div>
                <div class="color-btn" data-color="#000000" style="background: #000000;" title="Negro"></div>
                <div class="color-btn" data-color="#ffffff" style="background: #ffffff;" title="Blanco (borrador)"></div>
            </div>
            
            <!-- Lienzo para dibujar -->
            <canvas id="lienzoDibujo" width="300" height="300" class="lienzo-nuevo"></canvas>
        </div>
        
        <!-- Botones de control (más bonitos) -->
        <div class="botones-dibujo-nuevos">
            <button id="limpiarLienzo" class="btn-dibujo-nuevo">
                <span class="btn-icono">🗑️</span> LIMPIAR
            </button>
            <button id="descargarDibujo" class="btn-dibujo-nuevo">
                <span class="btn-icono">💾</span> GUARDAR
            </button>
        </div>
        
        <!-- Formulario de envío -->
        <h3 style="margin-top: 20px;">📤 COMPARTE TU CREACIÓN</h3>
        <form id="formCreativo">
            <input type="text" placeholder="Tu nombre" required>
            <input type="email" placeholder="Tu email">
            <textarea placeholder="Describe tu dibujo o comparte una teoría..." rows="3"></textarea>
            <button type="submit" class="btn-enviar">🌑 ENVIAR AL UPSIDE DOWN</button>
        </form>
        <p id="mensajeForm" style="color: #ff6600; margin-top: 10px;"></p>
    </div>
</div>
