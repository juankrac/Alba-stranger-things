<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stranger Things - Portal Madre | Upside Down</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-container">
        <!-- Portal Madre (estilo carne realista) -->
        <div class="madre-portal" id="madrePortal">
            <div class="portal-core"></div>
            <div class="portal-venas"></div>
            <div class="portal-tejido"></div>
            <div class="portal-electricidad"></div>
            <div class="portal-smoke"></div>
        </div>

        <!-- Efecto de distorsión ambiental -->
        <div class="distortion-overlay"></div>
        
        <!-- Luces parpadeantes estilo Hawkins Lab -->
        <div class="flicker-lights"></div>

        <!-- Texto debajo del portal -->
        <div class="portal-text">
            <h1 class="glitch" data-text="BIENVENIDOS AL MUNDO DE STRANGER THINGS">BIENVENIDOS AL MUNDO DE STRANGER THINGS</h1>
            <p>“No todos sobreviven...”</p>
            <div class="heartbeat"></div>
        </div>

        <!-- Botón de interacción para abrir/cerrar el portal -->
        <button class="portal-trigger" id="portalTrigger">⚡ ABRIR PORTAL ⚡</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
