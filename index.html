<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stranger Things - Portal Madre</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="portal-container">
        <div class="madre-portal" id="madrePortal">
            <div class="portal-core"></div>
            <div class="portal-venas"></div>
            <div class="portal-tejido"></div>
            <div class="portal-electricidad"></div>
            <div class="portal-smoke"></div>
        </div>

        <div class="distortion-overlay"></div>
        <div class="flicker-lights"></div>

        <div class="portal-text">
            <h1 class="glitch">BIENVENIDOS AL MUNDO DE STRANGER THINGS</h1>
            <p>“No todos sobreviven...”</p>
            <div class="heartbeat"></div>
        </div>

        <button class="portal-trigger" id="abrirPortalBtn">⚡ ABRIR PORTAL ⚡</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
